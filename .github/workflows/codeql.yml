name: CodeQL

on:
  push:
    branches:
      - main
      - master
      - copilot/**
  pull_request:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        language:
          - swift

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
